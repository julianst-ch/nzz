<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NZZ News Stories</title>
    <style>
        :root {
            --bg-color: #030914;
            --card-bg: #071224;
            --text-color: #ffffff;
            --text-muted: #a0aab8;
            --accent-blue: #1d9bf0;
            --story-duration: 7000ms; /* 7 seconds per story */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Container designed to mimic a mobile screen on desktop */
        .story-wrapper {
            width: 100%;
            max-width: 430px;
            height: 100vh;
            max-height: 932px; /* iPhone 15 Pro Max height */
            background-color: var(--bg-color);
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        @media (min-width: 440px) {
            .story-wrapper {
                border-radius: 16px;
                height: 85vh;
            }
        }

        /* Top Progress Bars */
        .progress-container {
            position: absolute;
            top: 12px;
            left: 0;
            right: 0;
            display: flex;
            padding: 0 12px;
            gap: 4px;
            z-index: 10;
        }

        .progress-bar {
            height: 2px;
            flex: 1;
            background-color: rgba(255, 255, 255, 0.3);
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background-color: #fff;
        }

        .progress-bar.seen .progress-fill {
            width: 100%;
        }

        /* Top Header Metadata */
        .story-header {
            position: absolute;
            top: 24px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 16px;
            z-index: 10;
            text-shadow: 0 1px 4px rgba(0,0,0,0.6);
        }

        .meta-info {
            display: flex;
            align-items: center;
            font-size: 14px;
            font-weight: 600;
        }

        .category {
            color: #fff;
        }

        .time-ago {
            color: var(--text-muted);
            margin-left: 6px;
        }

        .close-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            opacity: 0.8;
        }

        /* Invisible Navigation Touch Zones */
        .nav-zones {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 70%;
            display: flex;
            z-index: 5;
        }

        .zone-left {
            width: 30%;
            height: 100%;
        }

        .zone-right {
            width: 70%;
            height: 100%;
        }

        /* Main Story Slides Area */
        .slides-container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .slide.active {
            opacity: 1;
            visibility: visible;
        }

        /* Image Section */
        .image-container {
            width: 100%;
            height: 50%;
            position: relative;
            background-color: #000;
        }

        .story-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Smooth gradient blending image into bottom text card */
        .image-container::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: linear-gradient(to bottom, transparent, var(--bg-color));
        }

        /* Text Content Area */
        .content-container {
            flex: 1;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            background-color: var(--bg-color);
        }

        .ticker-badge {
            align-self: flex-start;
            font-size: 11px;
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 1px;
            color: var(--accent-blue);
            margin-bottom: 12px;
        }

        .story-title {
            font-family: Georgia, serif;
            font-size: 22px;
            line-height: 1.3;
            font-weight: 600;
            margin-bottom: 14px;
            color: var(--text-color);
        }

        .story-description {
            font-size: 15px;
            line-height: 1.5;
            color: var(--text-muted);
            margin-bottom: 16px;
        }

        .story-author {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: auto;
            margin-bottom: 10px;
        }

        /* Footer Interactions */
        .story-footer {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            background-color: var(--bg-color);
            z-index: 10;
        }

        .lesen-btn {
            flex: 1;
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            text-decoration: none;
            text-align: center;
            padding: 14px;
            border-radius: 25px;
            font-size: 15px;
            font-weight: 600;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.2s;
        }

        .lesen-btn:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }

        .bookmark-btn {
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15);
            width: 50px;
            height: 50px;
            border-radius: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .bookmark-icon {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: #fff;
            stroke-width: 2;
        }

        /* Loading Spinner */
        .loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 16px;
            color: var(--text-muted);
            z-index: 20;
        }
    </style>
</head>
<body>

    <div class="story-wrapper">
        <div class="loader" id="loader">Lade Nachrichten...</div>
        
        <!-- Top components -->
        <div class="progress-container" id="progressContainer"></div>
        <div class="story-header" id="storyHeader" style="display: none;">
            <div class="meta-info">
                <span class="category" id="headerCategory">International</span>
                <span class="time-ago" id="headerTime">40m</span>
            </div>
            <button class="close-btn">&times;</button>
        </div>

        <!-- Navigation Invisible Taps -->
        <div class="nav-zones">
            <div class="zone-left" id="zoneLeft"></div>
            <div class="zone-right" id="zoneRight"></div>
        </div>

        <!-- Main Body Slides -->
        <div class="slides-container" id="slidesContainer"></div>

        <!-- Sticky Bottom Bar -->
        <div class="story-footer" id="storyFooter" style="display: none;">
            <a href="#" target="_blank" class="lesen-btn" id="footerLink">
                Lesen <span style="margin-left: 5px; opacity: 0.6; font-weight: 400;" id="readingTime">• 3 Min</span>
            </a>
            <button class="bookmark-btn">
                <svg class="bookmark-icon" viewBox="0 0 24 24">
                    <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
                </svg>
            </button>
        </div>
    </div>

    <script>
        const RSS_URL = 'https://www.nzz.ch/recent.rss';
        // Utilizing allorigins proxy to bypass browser Cross-Origin Resource Sharing (CORS) limits
        const PROXY_URL = `https://api.allorigins.win/get?url=${encodeURIComponent(RSS_URL)}`;
        const STORY_DURATION = 7000; // 7 seconds

        let stories = [];
        let currentIndex = 0;
        let progressInterval = null;
        let startTime = null;
        let animationFrameId = null;

        async function fetchFeed() {
            try {
                const response = await fetch(PROXY_URL);
                const data = await response.json();
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(data.contents, "text/xml");
                const items = xmlDoc.querySelectorAll("item");
                
                stories = Array.from(items).slice(0, 10).map(item => {
                    // Check standard enclosure or media extensions for layout images
                    let imageUrl = item.querySelector('enclosure')?.getAttribute('url') || 
                                   item.getElementsByTagName('media:content')[0]?.getAttribute('url') || 
                                   'https://images.unsplash.com/photo-1585829365295-ab7cd400c167?w=600'; // high-quality fallback news asset

                    const title = item.querySelector('title')?.textContent || '';
                    const description = item.querySelector('description')?.textContent || '';
                    const link = item.querySelector('link')?.textContent || '#';
                    const pubDate = item.querySelector('pubDate')?.textContent || '';
                    const category = item.querySelector('category')?.textContent || 'NZZ';
                    const creator = item.getElementsByTagName('dc:creator')[0]?.textContent || '';

                    // Smart reading time calc based on word metrics
                    const wordCount = description.split(/\s+/).length + title.split(/\s+/).length;
                    const calculatedMinutes = Math.max(1, Math.ceil(wordCount / 180)); 

                    return { title, description, link, imageUrl, pubDate, category, creator, readingTime: calculatedMinutes };
                });

                if (stories.length === 0) throw new Error("No entries found");
                
                initStories();
            } catch (error) {
                console.error("Error parsing feed:", error);
                document.getElementById('loader').innerText = "Fehler beim Laden des Feeds.";
            }
        }

        function initStories() {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('storyHeader').style.display = 'flex';
            document.getElementById('storyFooter').style.display = 'flex';

            const progressContainer = document.getElementById('progressContainer');
            const slidesContainer = document.getElementById('slidesContainer');

            stories.forEach((story, idx) => {
                // Setup individual visual progress segments
                const bar = document.createElement('div');
                bar.className = 'progress-bar';
                bar.innerHTML = `<div class="progress-fill" id="fill-${idx}"></div>`;
                progressContainer.appendChild(bar);

                // Construct Slide Item Cards
                const slide = document.createElement('div');
                slide.className = `slide ${idx === 0 ? 'active' : ''}`;
                slide.innerHTML = `
                    <div class="image-container">
                        <img class="story-img" src="${story.imageUrl}" alt="News Image">
                    </div>
                    <div class="content-container">
                        ${story.title.toLowerCase().includes('live') ? '<div class="ticker-badge">LIVE-TICKER</div>' : ''}
                        <h1 class="story-title">${story.title}</h1>
                        <p class="story-description">${story.description}</p>
                        ${story.creator ? `<p class="story-author">${story.creator}</p>` : ''}
                    </div>
                `;
                slidesContainer.appendChild(slide);
            });

            showStory(0);
        }

        function showStory(index) {
            if (index < 0 || index >= stories.length) return;
            
            cancelAnimationFrame(animationFrameId);

            // Manage visible sliding elements
            const slides = document.querySelectorAll('.slide');
            slides.forEach((slide, idx) => {
                slide.classList.toggle('active', idx === index);
            });

            currentIndex = index;
            const story = stories[currentIndex];

            // Render Header Data Labels
            document.getElementById('headerCategory').innerText = story.category;
            document.getElementById('headerTime').innerText = formatRelativeTime(story.pubDate);
            
            // Adjust Action Links dynamically
            document.getElementById('footerLink').href = story.link;
            document.getElementById('readingTime').innerText = `• ${story.readingTime} Min`;

            // Adjust completed visual bar fills
            const bars = document.querySelectorAll('.progress-bar');
            bars.forEach((bar, idx) => {
                const fill = bar.querySelector('.progress-fill');
                if (idx < index) {
                    fill.style.width = '100%';
                } else if (idx > index) {
                    fill.style.width = '0%';
                }
            });

            // Start timeline progression tracking
            startTime = performance.now();
            animateProgress();
        }

        function animateProgress() {
            const activeFill = document.getElementById(`fill-${currentIndex}`);
            if (!activeFill) return;

            const elapsed = performance.now() - startTime;
            const progress = Math.min((elapsed / STORY_DURATION) * 100, 100);
            activeFill.style.width = `${progress}%`;

            if (progress < 100) {
                animationFrameId = requestAnimationFrame(animateProgress);
            } else {
                nextStory();
            }
        }

        function nextStory() {
            if (currentIndex < stories.length - 1) {
                showStory(currentIndex + 1);
            } else {
                // Return to first slide upon layout completion loop
                showStory(0);
            }
        }

        function prevStory() {
            if (currentIndex > 0) {
                showStory(currentIndex - 1);
            } else {
                // Restart current slide if it is the baseline entry
                showStory(0);
            }
        }

        // Relative timestamp converter
        function formatRelativeTime(dateStr) {
            try {
                const parsedDate = new Date(dateStr);
                const diffMs = new Date() - parsedDate;
                const diffMins = Math.floor(diffMs / 60000);
                const diffHours = Math.floor(diffMins / 60);

                if (diffMins < 60) return `${Math.max(1, diffMins)}m`;
                if (diffHours < 24) return `${diffHours}h`;
                return parsedDate.toLocaleDateString('de-CH', { day: 'numeric', month: 'short' });
            } catch (e) {
                return 'Jetzt';
            }
        }

        // Setup Touch Tap Target Interactions
        document.getElementById('zoneLeft').addEventListener('click', prevStory);
        document.getElementById('zoneRight').addEventListener('click', nextStory);

        // Run application on container runtime initialization
        fetchFeed();
    </script>
</body>
</html>
