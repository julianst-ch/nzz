<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NZZ News Stories - Kristallklar</title>
    <style>
        :root {
            --bg-color: #030914;
            --text-color: #ffffff;
            --text-muted: #a0aab8;
            --accent-blue: #1d9bf0;
            --story-duration: 7000ms;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        /* Perfektes 9:16 Verhältnis für Full-HD-Bildschirme */
        .story-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: calc(100vh * 9 / 16);
            max-height: calc(100vw * 16 / 9);
            aspect-ratio: 9 / 16;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0,0,0,0.85);
        }

        /* Fortschrittsbalken oben */
        .progress-container {
            position: absolute;
            top: 2vh;
            left: 0;
            right: 0;
            display: flex;
            padding: 0 4%;
            gap: 6px;
            z-index: 10;
        }

        .progress-bar {
            height: 3px;
            flex: 1;
            background-color: rgba(255, 255, 255, 0.25);
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background-color: #fff;
        }

        /* Header mit Kategorie & Zeit */
        .story-header {
            position: absolute;
            top: 4vh;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            z-index: 10;
            text-shadow: 0 2px 8px rgba(0,0,0,0.8);
        }

        .meta-info {
            display: flex;
            align-items: center;
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .category {
            color: #fff;
        }

        .time-ago {
            color: var(--text-muted);
            margin-left: 8px;
        }

        .close-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 2rem;
            cursor: pointer;
            opacity: 0.7;
            line-height: 1;
        }

        /* Unsichtbare Klickbereiche für Navigation */
        .nav-zones {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            display: flex;
        }

        .zone-left {
            width: 33%;
            height: 100%;
        }

        .zone-right {
            width: 67%;
            height: 100%;
        }

        /* Slides */
        .slides-container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s ease-in-out;
            display: flex;
            flex-direction: column;
        }

        .slide.active {
            opacity: 1;
            visibility: visible;
        }

        /* Bild-Bereich */
        .image-container {
            width: 100%;
            height: 58%;
            position: relative;
            background-color: #000;
        }

        .story-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Dunkler Verlauf nach unten */
        .image-container::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 120px;
            background: linear-gradient(to bottom, transparent, var(--bg-color));
        }

        /* Text-Bereich */
        .content-container {
            flex: 1;
            padding: 4% 6% 0 6%; 
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            background-color: var(--bg-color);
            margin-bottom: 10vh; 
        }

        .ticker-badge {
            align-self: flex-start;
            font-size: 0.85rem;
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 1.5px;
            color: var(--accent-blue);
            margin-bottom: 3%;
        }

        .story-title {
            font-family: Georgia, serif;
            font-size: 2.1rem;
            line-height: 1.35;
            font-weight: 600;
            margin-bottom: 4%;
            color: var(--text-color);
        }

        .story-description {
            font-size: 1.25rem;
            line-height: 1.65;
            color: var(--text-muted);
        }

        .story-author {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-top: auto;
            padding-top: 15px;
        }

        /* Lade-Anzeige */
        .loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.2rem;
            color: var(--text-muted);
            z-index: 20;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="error-debug" style="position: absolute; top: 0; left: 0; right: 0; background: rgba(220, 20, 60, 0.95); color: white; padding: 15px; z-index: 99999; font-family: monospace; font-size: 13px; display: none; word-break: break-all; text-align: left;"></div>

    <div class="story-wrapper">
        <div class="loader" id="loader">Lade Nachrichten...<br><span style="font-size:0.8rem; opacity:0.5;">Verbinde mit NZZ Feed...</span></div>
        
        <div class="progress-container" id="progressContainer"></div>
        <div class="story-header" id="storyHeader" style="display: none;">
            <div class="meta-info">
                <span class="category" id="headerCategory">NZZ</span>
                <span class="time-ago" id="headerTime">Jetzt</span>
            </div>
            <button class="close-btn">&times;</button>
        </div>

        <div class="nav-zones">
            <div class="zone-left" id="zoneLeft"></div>
            <div class="zone-right" id="zoneRight"></div>
        </div>

        <div class="slides-container" id="slidesContainer"></div>
    </div>

    <script>
        window.onerror = function(msg, url, line) {
            const errorDiv = document.getElementById('error-debug');
            if (errorDiv) {
                errorDiv.style.display = 'block';
                errorDiv.innerText = "Fehler im Code erkannt:\n\n" + msg + "\nZeile: " + line;
            }
            return false;
        };

        const RSS_URL = 'https://www.nzz.ch/recent.rss';
        const STORY_DURATION = 7000;

        let stories = [];
        let currentIndex = 0;
        let startTime = null;
        let animationFrameId = null;

        async function fetchFeed() {
            try {
                const response = await fetch(`https://corsproxy.io/?${encodeURIComponent(RSS_URL)}`);
                if (!response.ok) throw new Error("Proxy 1 fehlgeschlagen");
                const xmlText = await response.text();
                parseAndInit(xmlText);
                return;
            } catch (e) {
                console.warn("Erster Proxy fehlgeschlagen, versuche Backup...", e);
            }

            try {
                const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(RSS_URL)}`);
                if (!response.ok) throw new Error("Proxy 2 fehlgeschlagen");
                const data = await response.json();
                if (!data.contents) throw new Error("Kein Inhalt von Backup-Proxy");
                parseAndInit(data.contents);
                return;
            } catch (e) {
                console.error("Alle Proxies blockiert:", e);
                document.getElementById('loader').innerText = "Fehler beim Laden. Bitte Seite neu laden.";
            }
        }

        function parseAndInit(xmlString) {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(xmlString, "text/xml");
            const items = xmlDoc.querySelectorAll("item");
            
            stories = Array.from(items).slice(0, 15).map(item => {
                const title = item.querySelector('title')?.textContent || '';
                const rawDescription = item.querySelector('description')?.textContent || '';
                const pubDate = item.querySelector('pubDate')?.textContent || '';
                const category = item.querySelector('category')?.textContent || 'International';

                let imageUrl = '';
                let creator = '';
                
                const allNodes = item.getElementsByTagName('*');
                
                for (let n = 0; n < allNodes.length; n++) {
                    const node = allNodes[n];
                    const localName = (node.localName || node.nodeName.split(':').pop()).toLowerCase();
                    
                    if (localName === 'content' || localName === 'enclosure' || localName === 'thumbnail') {
                        const url = node.getAttribute('url') || node.getAttribute('href');
                        if (url && url.startsWith('http')) {
                            imageUrl = url;
                        }
                    }
                    if (localName === 'creator') {
                        creator = node.textContent || '';
                    }
                }

                if (!imageUrl && rawDescription) {
                    const imgMatch = rawDescription.match(/<img[^>]+src="([^">]+)"/i) || rawDescription.match(/src="([^"]+)"/i);
                    if (imgMatch && imgMatch[1]) {
                        imageUrl = imgMatch[1];
                    }
                }

                if (!imageUrl) {
                    const serializer = new XMLSerializer();
                    const itemXml = serializer.serializeToString(item);
                    const nzzImgMatch = itemXml.match(/(https:\/\/img\.nzz\.ch\/[^"\s>]+)/i) || itemXml.match(/(https?:\/\/[^"\s>]+\.(?:jpg|jpeg|png|webp|gif)[^"\s>]*)/i);
                    if (nzzImgMatch && nzzImgMatch[1]) {
                        imageUrl = nzzImgMatch[1];
                    }
                }

                // KORRIGIERTE HIGH-RES LOGIK FÜR DAS NZZ IMAGE-CDN
                if (imageUrl && imageUrl.includes('nzz.ch')) {
                    // Wir werfen alle standardmäßig drosselnden Parameter ab
                    const baseUrl = imageUrl.split('?')[0];
                    // Wir fordern eine HD-Breite an und nutzen 'fit=bounds&auto=webp' für die Skalierung
                    imageUrl = `${baseUrl}?width=1440&fit=bounds&quality=85&auto=webp`;
                }

                if (!imageUrl) {
                    imageUrl = 'https://images.unsplash.com/photo-1585829365295-ab7cd400c167?w=1200';
                }

                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = rawDescription;
                const embeddedImg = tempDiv.querySelector('img');
                if (embeddedImg) embeddedImg.remove();
                const cleanDescription = tempDiv.textContent || tempDiv.innerText || '';

                return { 
                    title, 
                    description: cleanDescription.trim(), 
                    imageUrl, 
                    pubDate, 
                    category, 
                    creator 
                };
            });

            if (stories.length === 0) {
                document.getElementById('loader').innerText = "Keine aktuellen Nachrichten gefunden.";
                return;
            }
            
            initStories();
        }

        function initStories() {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('storyHeader').style.display = 'flex';

            const progressContainer = document.getElementById('progressContainer');
            const slidesContainer = document.getElementById('slidesContainer');

            progressContainer.innerHTML = '';
            slidesContainer.innerHTML = '';

            stories.forEach((story, idx) => {
                const bar = document.createElement('div');
                bar.className = 'progress-bar';
                bar.innerHTML = `<div class="progress-fill" id="fill-${idx}"></div>`;
                progressContainer.appendChild(bar);

                const slide = document.createElement('div');
                slide.className = `slide ${idx === 0 ? 'active' : ''}`;
                slide.innerHTML = `
                    <div class="image-container">
                        <img class="story-img" src="${story.imageUrl}" alt="News Image">
                    </div>
                    <div class="content-container">
                        ${story.title.toLowerCase().includes('live') || story.title.toLowerCase().includes('ticker') ? '<div class="ticker-badge">LIVE-TICKER</div>' : ''}
                        <h1 class="story-title">${story.title}</h1>
                        <p class="story-description">${story.description}</p>
                        ${story.creator ? `<p class="story-author">${story.creator}</p>` : ''}
                    </div>
                `;
                slidesContainer.appendChild(slide);
            });

            showStory(0);
        }

        function showStory(index) {
            if (index < 0 || index >= stories.length) return;
            
            cancelAnimationFrame(animationFrameId);

            const slides = document.querySelectorAll('.slide');
            slides.forEach((slide, idx) => {
                slide.classList.toggle('active', idx === index);
            });

            currentIndex = index;
            const story = stories[currentIndex];

            document.getElementById('headerCategory').innerText = story.category;
            document.getElementById('headerTime').innerText = formatRelativeTime(story.pubDate);
            
            const bars = document.querySelectorAll('.progress-bar');
            bars.forEach((bar, idx) => {
                const fill = bar.querySelector('.progress-fill');
                if (idx < index) {
                    fill.style.width = '100%';
                } else if (idx > index) {
                    fill.style.width = '0%';
                }
            });

            startTime = performance.now();
            animateProgress();
        }

        function animateProgress() {
            const activeFill = document.getElementById(`fill-${currentIndex}`);
            if (!activeFill) return;

            const elapsed = performance.now() - startTime;
            const progress = Math.min((elapsed / STORY_DURATION) * 100, 100);
            activeFill.style.width = `${progress}%`;

            if (progress < 100) {
                animationFrameId = requestAnimationFrame(animateProgress);
            } else {
                nextStory();
            }
        }

        function nextStory() {
            if (currentIndex < stories.length - 1) {
                showStory(currentIndex + 1);
            } else {
                showStory(0);
            }
        }

        function prevStory() {
            if (currentIndex > 0) {
                showStory(currentIndex - 1);
            } else {
                showStory(0);
            }
        }

        function formatRelativeTime(dateStr) {
            try {
                const parsedDate = new Date(dateStr);
                const diffMs = new Date() - parsedDate;
                const diffMins = Math.floor(diffMs / 60000);
                const diffHours = Math.floor(diffMins / 60);

                if (diffMins < 60) return `${Math.max(1, diffMins)}m`;
                if (diffHours < 24) return `${diffHours}h`;
                return parsedDate.toLocaleDateString('de-CH', { day: 'numeric', month: 'short' });
            } catch (e) {
                return 'Jetzt';
            }
        }

        document.getElementById('zoneLeft').addEventListener('click', prevStory);
        document.getElementById('zoneRight').addEventListener('click', nextStory);

        fetchFeed();
    </script>
</body>
</html>
