<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NZZ News Stories - Full HD 9:16 (Ultra HD & Shifted Up)</title>
    <style>
        :root {
            --bg-color: #030914;
            --text-color: #ffffff;
            --text-muted: #a0aab8;
            --accent-blue: #1d9bf0;
            --story-duration: 7000ms;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        /* Perfektes 9:16 Verhältnis für Full-HD-Bildschirme */
        .story-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: calc(100vh * 9 / 16);
            max-height: calc(100vw * 16 / 9);
            aspect-ratio: 9 / 16;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0,0,0,0.85);
        }

        /* Fortschrittsbalken oben */
        .progress-container {
            position: absolute;
            top: 2vh;
            left: 0;
            right: 0;
            display: flex;
            padding: 0 4%;
            gap: 6px;
            z-index: 10;
        }

        .progress-bar {
            height: 3px;
            flex: 1;
            background-color: rgba(255, 255, 255, 0.25);
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background-color: #fff;
        }

        /* Header mit Kategorie & Zeit */
        .story-header {
            position: absolute;
            top: 4vh;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            z-index: 10;
            text-shadow: 0 2px 8px rgba(0,0,0,0.8);
        }

        .meta-info {
            display: flex;
            align-items: center;
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .category {
            color: #fff;
        }

        .time-ago {
            color: var(--text-muted);
            margin-left: 8px;
        }

        .close-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 2rem;
            cursor: pointer;
            opacity: 0.7;
            line-height: 1;
        }

        /* Unsichtbare Klickbereiche für Navigation */
        .nav-zones {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            display: flex;
        }

        .zone-left {
            width: 33%;
            height: 100%;
        }

        .zone-right {
            width: 67%;
            height: 100%;
        }

        /* Slides */
        .slides-container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s ease-in-out;
            display: flex;
            flex-direction: column;
        }

        .slide.active {
            opacity: 1;
            visibility: visible;
        }

        /* Bild-Bereich */
        .image-container {
            width: 100%;
            height: 58%;
            position: relative;
            background-color: #000;
        }

        .story-img {
